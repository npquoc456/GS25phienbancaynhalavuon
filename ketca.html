        </div>

    </div>
        <script>
                // Hàm tính tiền siêu gọn không cần switch
                let danhSachTien = {
                    'SL500': 0, 'SL200': 0, 'SL100': 0, 'SL50': 0, 'SL20': 0,
                    'SL10': 0, 'SL5': 0, 'SL2': 0, 'SL1': 0, 'SL05': 0
                }; //tao mang 
                function tinhtongtien(inputId, menhGia, resultId){
                    let sl = document.getElementById(inputId).value; //lay so luong tu oninput
                    
                    if (sl === "") sl = 0;  

                    let thanhTien = parseInt(sl) /*doi sang int*/ * menhGia;  

                    
                    document.getElementById(resultId).innerHTML = /*doi ve string*/thanhTien.toLocaleString('vi-VN'); 
                    danhSachTien[inputId] = thanhTien;
                    tongsotien(); 
                }

                function tongsotien(){
                    let tongtien = 0;
                     for(let key in danhSachTien){
                        tongtien = tongtien + danhSachTien[key]; 
                     }
                    document.getElementById("resulttong").innerHTML = tongtien.toLocaleString('vi-VN'); 
                }

                function clickpage(index) {
                        app.choose(index); 
                }
                        function laytennhanvien(){

            let nameemployee = app.getname();

            if(nameemployee != null){
                document.getElementById("tennhanvienhien").innerHTML = nameemployee; 
            }
            else{
                console.log("nameemployee is null");
            }
        }
        function layidnhanvien(){
            let idemployee = app.getid();

            if(idemployee != null){
                document.getElementById("idnhanvienhien").innerHTML = idemployee; 
            }
            else{
                console.log("idemployee is null");
            }
         }

            </script>
